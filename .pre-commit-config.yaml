# Pre-commit hooks configuration
# See https://prek.j178.dev/ for more information
# See https://pre-commit.com/hooks.html for more hooks

exclude: '^(examples/test-live/|vendor/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev=HEAD~1 --fix
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: nix develop --command -- go test -short -timeout=5m ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: nix-build-checks
        name: nix build checks (non-VM)
        entry: bash -c 'nix build --fallback .#checks.x86_64-linux.build .#checks.x86_64-linux.golangci-lint .#checks.x86_64-linux.formatting'
        language: system
        files: ^(flake\.(nix|lock)|go\.(mod|sum))$
        pass_filenames: false
