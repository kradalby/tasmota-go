name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every `run:` step executes inside `nix develop`, so go comes straight from the
# flake devShell with no per-step prefix.
defaults:
  run:
    shell: nix develop --command bash -e {0}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install Nix
      uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

    - name: Setup Nix cache (hestia)
      uses: Mic92/hestia@7ae4509d1c3cacd4a31b91d9ad308d74e0b5a053 # v1.0.2

    - name: Download dependencies
      run: go mod download

    - name: Build examples
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p dist
        for example in examples/*/; do
          example_name=$(basename "$example")
          go build -o dist/${example_name}-${{ matrix.goos }}-${{ matrix.goarch }} ./${example}
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: examples-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/
      if: github.event_name == 'release'
